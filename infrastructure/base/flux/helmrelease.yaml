apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: flux
  namespace: flux-system
spec:
  interval: 1h
  chart:
    spec:
      chart: flux2
      # Pin to a minor range — bump this to upgrade Flux across all clusters
      version: ">=2.0.0 <3.0.0"
      sourceRef:
        kind: HelmRepository
        name: fluxcd-community
        namespace: flux-system
      interval: 1h
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    # Enable all core controllers
    sourceController:
      create: true
    kustomizeController:
      create: true
    helmController:
      create: true
    notificationController:
      create: true
    imageAutomationController:
      create: false   # enable if you want image update automation
    imageReflectionController:
      create: false   # enable alongside imageAutomationController
