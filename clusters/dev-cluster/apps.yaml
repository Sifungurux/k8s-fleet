apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: k8s-fleet
  path: ./apps/dev-cluster
  prune: true
  # Apps depend on infrastructure being healthy first
  dependsOn:
    - name: infrastructure
